<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex,nofollow">
<title>GA4 Isolated Diagnostic</title>
<style>
  body { font-family: monospace; max-width: 640px; margin: 40px auto; padding: 0 16px; }
  button { font-size: 16px; padding: 10px 16px; cursor: pointer; }
  #log { white-space: pre-wrap; background: #111; color: #0f0; padding: 12px; margin-top: 20px; min-height: 120px; }
</style>
</head>
<body>
  <h1>GA4 Isolated Diagnostic — G-TWH30WBSXF</h1>
  <p>Pagina statica isolata. Nessun React, nessun runtime Next, nessun loader Esigenta.</p>
  <button id="run-btn">Autorizza Analytics e invia test</button>
  <div id="log"></div>

  <script>
    window.dataLayer = window.dataLayer || [];

    function gtag() {
      dataLayer.push(arguments);
    }

    gtag("consent", "default", {
      analytics_storage: "denied",
      ad_storage: "denied",
      ad_user_data: "denied",
      ad_personalization: "denied"
    });

    var logEl = document.getElementById("log");
    function log(msg) {
      var ts = new Date().toISOString().split("T")[1].replace("Z", "");
      logEl.textContent += "[" + ts + "] " + msg + "\n";
    }

    log("consent default (denied) inviato");

    document.getElementById("run-btn").addEventListener("click", function onClick() {
      this.disabled = true;

      gtag("consent", "update", {
        analytics_storage: "granted"
      });
      log("consent update (analytics_storage granted) inviato");

      var script = document.createElement("script");
      script.async = true;
      script.src = "https://www.googletagmanager.com/gtag/js?id=G-TWH30WBSXF";
      script.onload = function () {
        log("gtag.js caricato (onload)");

        gtag("js", new Date());
        log("gtag('js', new Date()) inviato");

        gtag("config", "G-TWH30WBSXF", {
          send_page_view: false
        });
        log("gtag('config', 'G-TWH30WBSXF', {send_page_view:false}) inviato");

        gtag("event", "ga4_isolated_diagnostic", {
          send_to: "G-TWH30WBSXF",
          debug_mode: true,
          page_location: location.href
        });
        log("gtag('event', 'ga4_isolated_diagnostic', ...) inviato");
        log("Controlla ora il pannello Network filtrato per 'collect'.");
      };
      script.onerror = function () {
        log("ERRORE: gtag.js non si e' caricato (onerror)");
      };

      document.head.appendChild(script);
      log("script gtag.js iniettato, in attesa di onload...");
    });
  </script>
</body>
</html>
